worker_processes auto;
error_log stderr notice;
daemon off;
pid /tmp/nginx.pid;
env BLOCKCHAIN_DATA_FILE;
env BLOCKCHAIN_DIFFICULTY;
env BLOCKCHAIN_TARGET_BLOCK_SECONDS;
env BLOCKCHAIN_DIFFICULTY_ADJUSTMENT_WINDOW;
env BLOCKCHAIN_MIN_DIFFICULTY_PREFIX_LENGTH;
env BLOCKCHAIN_MAX_DIFFICULTY_PREFIX_LENGTH;
env BLOCKCHAIN_REWARD;
env BLOCKCHAIN_NODE_ID;
env BLOCKCHAIN_NODE_URL;
env BLOCKCHAIN_MODE;
env BLOCKCHAIN_CHAIN_ID;
env BLOCKCHAIN_PEER_TIMEOUT_SECONDS;
env BLOCKCHAIN_MAX_PEERS;
env BLOCKCHAIN_MAX_PENDING_TRANSACTIONS;
env BLOCKCHAIN_MAX_TRANSACTIONS_PER_BLOCK;
env BLOCKCHAIN_MIN_TRANSACTION_FEE;
env BLOCKCHAIN_MAX_TRANSACTION_NOTE_BYTES;
env BLOCKCHAIN_REQUIRE_HTTPS_PEERS;
env BLOCKCHAIN_ENABLE_SERVER_WALLETS;
env BLOCKCHAIN_PUBLIC_RATE_LIMIT_PER_MINUTE;
env BLOCKCHAIN_ADMIN_RATE_LIMIT_PER_MINUTE;
env BLOCKCHAIN_PEER_RATE_LIMIT_PER_MINUTE;
env BLOCKCHAIN_ADMIN_TOKEN;
env BLOCKCHAIN_PEER_SHARED_SECRET;
env BLOCKCHAIN_ALLOWED_PEER_HOSTS;
env BLOCKCHAIN_ALLOWED_PEER_IDS;
env BLOCKCHAIN_ALLOW_PLAINTEXT_GOSSIP;
env BLOCKCHAIN_BOOTSTRAP_PEERS;
env BLOCKCHAIN_BACKUP_DIR;
env BLOCKCHAIN_PEER_DISCOVERY_FANOUT;
env BLOCKCHAIN_PEER_ADVERTISED_LIMIT;
env BLOCKCHAIN_PEER_BACKOFF_BASE_SECONDS;
env BLOCKCHAIN_PEER_BAN_SECONDS;
env BLOCKCHAIN_PEER_MAX_FAILURES_BEFORE_BAN;
env BLOCKCHAIN_MAX_PEERS_PER_IP;
env BLOCKCHAIN_MAX_PEERS_PER_SUBNET;
env BLOCKCHAIN_PEER_MAINTENANCE_ENABLED;
env BLOCKCHAIN_PEER_MAINTENANCE_INTERVAL_SECONDS;
env BLOCKCHAIN_P2P_ENABLED;
env BLOCKCHAIN_P2P_BIND_HOST;
env BLOCKCHAIN_P2P_PORT;
env BLOCKCHAIN_P2P_ADVERTISE_HOST;
env BLOCKCHAIN_P2P_SEEDS;
env BLOCKCHAIN_P2P_DIAL_DISCOVERED_PEERS;
env BLOCKCHAIN_P2P_CONNECT_INTERVAL_SECONDS;
env BLOCKCHAIN_P2P_POLL_INTERVAL_SECONDS;
env BLOCKCHAIN_P2P_MAX_MESSAGE_BYTES;
env BLOCKCHAIN_P2P_TLS_ENABLED;
env BLOCKCHAIN_P2P_TLS_CERT_PATH;
env BLOCKCHAIN_P2P_TLS_KEY_PATH;
env BLOCKCHAIN_NODE_IDENTITY_PRIVATE_KEY_PATH;
env BLOCKCHAIN_NODE_IDENTITY_PUBLIC_KEY_PATH;
env BLOCKCHAIN_GOSSIP_ENABLED;
env BLOCKCHAIN_GOSSIP_BIND_HOST;
env BLOCKCHAIN_GOSSIP_PORT;
env BLOCKCHAIN_GOSSIP_ADVERTISE_HOST;
env BLOCKCHAIN_GOSSIP_SEEDS;
env BLOCKCHAIN_GOSSIP_FANOUT;
env BLOCKCHAIN_GOSSIP_INTERVAL_SECONDS;
env BLOCKCHAIN_GOSSIP_MESSAGE_TTL_SECONDS;
env BLOCKCHAIN_GOSSIP_MAX_HOPS;

events {
  worker_connections 1024;
}

http {
  include /app/mime.types;
  access_log /dev/stdout;
  default_type application/json;
  charset utf-8;
  lua_shared_dict blockchain_locks 1m;
  lua_shared_dict blockchain_rate_limits 5m;
  lua_package_path "/app/?.lua;/app/?/init.lua;/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/lualib/?.lua;/usr/share/lua/5.1/?.lua;/usr/share/lua/5.1/?/init.lua;;";
  lua_package_cpath "/usr/local/openresty/lualib/?.so;/usr/lib/x86_64-linux-gnu/lua/5.1/?.so;/usr/local/lib/lua/5.1/?.so;;";
  init_worker_by_lua_file /app/init_worker.lua;

  server {
    listen 8080;
    client_max_body_size 2m;

    location = / {
      root /app;
      try_files /static/index.html =404;
    }

    location /static/ {
      alias /app/static/;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    location / {
      content_by_lua_file /app/app.lua;
    }
  }
}
