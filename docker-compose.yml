services:
  lua_blockchain:
    container_name: "lua-blockchain-instance"
    build:
      context: .
    ports:
      - "${BLOCKCHAIN_PORT:-8080}:8080"
      - "${BLOCKCHAIN_P2P_PORT:-19100}:${BLOCKCHAIN_P2P_PORT:-19100}"
      - "${BLOCKCHAIN_GOSSIP_PORT:-19090}:${BLOCKCHAIN_GOSSIP_PORT:-19090}/udp"
    environment:
      BLOCKCHAIN_MODE: "${BLOCKCHAIN_MODE:-development}"
      BLOCKCHAIN_DIFFICULTY: "${BLOCKCHAIN_DIFFICULTY:-0000}"
      BLOCKCHAIN_REWARD: "${BLOCKCHAIN_REWARD:-1}"
      BLOCKCHAIN_NODE_ID: "${BLOCKCHAIN_NODE_ID:-demo-node-1}"
      BLOCKCHAIN_NODE_URL: "${BLOCKCHAIN_NODE_URL:-http://127.0.0.1:8080}"
      BLOCKCHAIN_CHAIN_ID: "${BLOCKCHAIN_CHAIN_ID:-lua-blockchain-mainnet}"
      BLOCKCHAIN_DATA_FILE: "${BLOCKCHAIN_DATA_FILE:-/app/data/blockchain.db}"
      BLOCKCHAIN_PEER_TIMEOUT_SECONDS: "${BLOCKCHAIN_PEER_TIMEOUT_SECONDS:-5}"
      BLOCKCHAIN_TARGET_BLOCK_SECONDS: "${BLOCKCHAIN_TARGET_BLOCK_SECONDS:-30}"
      BLOCKCHAIN_DIFFICULTY_ADJUSTMENT_WINDOW: "${BLOCKCHAIN_DIFFICULTY_ADJUSTMENT_WINDOW:-10}"
      BLOCKCHAIN_MIN_DIFFICULTY_PREFIX_LENGTH: "${BLOCKCHAIN_MIN_DIFFICULTY_PREFIX_LENGTH:-2}"
      BLOCKCHAIN_MAX_DIFFICULTY_PREFIX_LENGTH: "${BLOCKCHAIN_MAX_DIFFICULTY_PREFIX_LENGTH:-6}"
      BLOCKCHAIN_MAX_PEERS: "${BLOCKCHAIN_MAX_PEERS:-64}"
      BLOCKCHAIN_MAX_PENDING_TRANSACTIONS: "${BLOCKCHAIN_MAX_PENDING_TRANSACTIONS:-5000}"
      BLOCKCHAIN_MAX_TRANSACTIONS_PER_BLOCK: "${BLOCKCHAIN_MAX_TRANSACTIONS_PER_BLOCK:-250}"
      BLOCKCHAIN_MIN_TRANSACTION_FEE: "${BLOCKCHAIN_MIN_TRANSACTION_FEE:-0.01}"
      BLOCKCHAIN_MAX_TRANSACTION_NOTE_BYTES: "${BLOCKCHAIN_MAX_TRANSACTION_NOTE_BYTES:-280}"
      BLOCKCHAIN_REQUIRE_HTTPS_PEERS: "${BLOCKCHAIN_REQUIRE_HTTPS_PEERS:-false}"
      BLOCKCHAIN_ENABLE_SERVER_WALLETS: "${BLOCKCHAIN_ENABLE_SERVER_WALLETS:-false}"
      BLOCKCHAIN_PUBLIC_RATE_LIMIT_PER_MINUTE: "${BLOCKCHAIN_PUBLIC_RATE_LIMIT_PER_MINUTE:-240}"
      BLOCKCHAIN_ADMIN_RATE_LIMIT_PER_MINUTE: "${BLOCKCHAIN_ADMIN_RATE_LIMIT_PER_MINUTE:-60}"
      BLOCKCHAIN_PEER_RATE_LIMIT_PER_MINUTE: "${BLOCKCHAIN_PEER_RATE_LIMIT_PER_MINUTE:-600}"
      BLOCKCHAIN_ADMIN_TOKEN: "${BLOCKCHAIN_ADMIN_TOKEN:-}"
      BLOCKCHAIN_PEER_SHARED_SECRET: "${BLOCKCHAIN_PEER_SHARED_SECRET:-}"
      BLOCKCHAIN_ALLOWED_PEER_HOSTS: "${BLOCKCHAIN_ALLOWED_PEER_HOSTS:-}"
      BLOCKCHAIN_ALLOWED_PEER_IDS: "${BLOCKCHAIN_ALLOWED_PEER_IDS:-}"
      BLOCKCHAIN_ALLOW_PLAINTEXT_GOSSIP: "${BLOCKCHAIN_ALLOW_PLAINTEXT_GOSSIP:-false}"
      BLOCKCHAIN_BOOTSTRAP_PEERS: "${BLOCKCHAIN_BOOTSTRAP_PEERS:-}"
      BLOCKCHAIN_BACKUP_DIR: "${BLOCKCHAIN_BACKUP_DIR:-/app/data/backups}"
      BLOCKCHAIN_PEER_DISCOVERY_FANOUT: "${BLOCKCHAIN_PEER_DISCOVERY_FANOUT:-8}"
      BLOCKCHAIN_PEER_ADVERTISED_LIMIT: "${BLOCKCHAIN_PEER_ADVERTISED_LIMIT:-16}"
      BLOCKCHAIN_PEER_BACKOFF_BASE_SECONDS: "${BLOCKCHAIN_PEER_BACKOFF_BASE_SECONDS:-15}"
      BLOCKCHAIN_PEER_BAN_SECONDS: "${BLOCKCHAIN_PEER_BAN_SECONDS:-300}"
      BLOCKCHAIN_PEER_MAX_FAILURES_BEFORE_BAN: "${BLOCKCHAIN_PEER_MAX_FAILURES_BEFORE_BAN:-5}"
      BLOCKCHAIN_MAX_PEERS_PER_IP: "${BLOCKCHAIN_MAX_PEERS_PER_IP:-4}"
      BLOCKCHAIN_MAX_PEERS_PER_SUBNET: "${BLOCKCHAIN_MAX_PEERS_PER_SUBNET:-8}"
      BLOCKCHAIN_PEER_MAINTENANCE_ENABLED: "${BLOCKCHAIN_PEER_MAINTENANCE_ENABLED:-true}"
      BLOCKCHAIN_PEER_MAINTENANCE_INTERVAL_SECONDS: "${BLOCKCHAIN_PEER_MAINTENANCE_INTERVAL_SECONDS:-30}"
      BLOCKCHAIN_P2P_ENABLED: "${BLOCKCHAIN_P2P_ENABLED:-true}"
      BLOCKCHAIN_P2P_BIND_HOST: "${BLOCKCHAIN_P2P_BIND_HOST:-0.0.0.0}"
      BLOCKCHAIN_P2P_PORT: "${BLOCKCHAIN_P2P_PORT:-19100}"
      BLOCKCHAIN_P2P_ADVERTISE_HOST: "${BLOCKCHAIN_P2P_ADVERTISE_HOST:-}"
      BLOCKCHAIN_P2P_SEEDS: "${BLOCKCHAIN_P2P_SEEDS:-}"
      BLOCKCHAIN_P2P_DIAL_DISCOVERED_PEERS: "${BLOCKCHAIN_P2P_DIAL_DISCOVERED_PEERS:-false}"
      BLOCKCHAIN_P2P_CONNECT_INTERVAL_SECONDS: "${BLOCKCHAIN_P2P_CONNECT_INTERVAL_SECONDS:-5}"
      BLOCKCHAIN_P2P_POLL_INTERVAL_SECONDS: "${BLOCKCHAIN_P2P_POLL_INTERVAL_SECONDS:-2}"
      BLOCKCHAIN_P2P_MAX_MESSAGE_BYTES: "${BLOCKCHAIN_P2P_MAX_MESSAGE_BYTES:-1048576}"
      BLOCKCHAIN_P2P_TLS_ENABLED: "${BLOCKCHAIN_P2P_TLS_ENABLED:-true}"
      BLOCKCHAIN_P2P_TLS_CERT_PATH: "${BLOCKCHAIN_P2P_TLS_CERT_PATH:-/app/data/node_p2p_cert.pem}"
      BLOCKCHAIN_P2P_TLS_KEY_PATH: "${BLOCKCHAIN_P2P_TLS_KEY_PATH:-/app/data/node_p2p_key.pem}"
      BLOCKCHAIN_NODE_IDENTITY_PRIVATE_KEY_PATH: "${BLOCKCHAIN_NODE_IDENTITY_PRIVATE_KEY_PATH:-/app/data/node_identity_private.pem}"
      BLOCKCHAIN_NODE_IDENTITY_PUBLIC_KEY_PATH: "${BLOCKCHAIN_NODE_IDENTITY_PUBLIC_KEY_PATH:-/app/data/node_identity_public.pem}"
      BLOCKCHAIN_GOSSIP_ENABLED: "${BLOCKCHAIN_GOSSIP_ENABLED:-false}"
      BLOCKCHAIN_GOSSIP_BIND_HOST: "${BLOCKCHAIN_GOSSIP_BIND_HOST:-0.0.0.0}"
      BLOCKCHAIN_GOSSIP_PORT: "${BLOCKCHAIN_GOSSIP_PORT:-19090}"
      BLOCKCHAIN_GOSSIP_ADVERTISE_HOST: "${BLOCKCHAIN_GOSSIP_ADVERTISE_HOST:-}"
      BLOCKCHAIN_GOSSIP_SEEDS: "${BLOCKCHAIN_GOSSIP_SEEDS:-}"
      BLOCKCHAIN_GOSSIP_FANOUT: "${BLOCKCHAIN_GOSSIP_FANOUT:-3}"
      BLOCKCHAIN_GOSSIP_INTERVAL_SECONDS: "${BLOCKCHAIN_GOSSIP_INTERVAL_SECONDS:-5}"
      BLOCKCHAIN_GOSSIP_MESSAGE_TTL_SECONDS: "${BLOCKCHAIN_GOSSIP_MESSAGE_TTL_SECONDS:-30}"
      BLOCKCHAIN_GOSSIP_MAX_HOPS: "${BLOCKCHAIN_GOSSIP_MAX_HOPS:-3}"
    volumes:
      - blockchain_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "luajit -e \"local http=require('socket.http'); local _, code = http.request('http://127.0.0.1:8080/api/ready'); os.exit(code == 200 and 0 or 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["openresty", "-p", "/app/", "-c", "/app/nginx.conf"]

volumes:
  blockchain_data:
